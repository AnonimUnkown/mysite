<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для формы */
        .reg-card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
        }
        .reg-card h2 {
            margin-bottom: 20px;
            color: #764ba2;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Чтобы отступы не распирали поле */
        }
        .submit-btn {
            width: 100%;
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background: #667eea;
        }
        .back-link {
            display: block;
            margin-top: 15px;
            color: #764ba2;
            font-size: 0.8rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="reg-card">
        <h2>Регистрация</h2>
        <form>
            <div class="input-group">
                <label>Ваше имя</label>
                <input type="text" placeholder="Введите имя">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="button" class="submit-btn" onclick="alert('Вы успешно зарегистрированы!')">Создать аккаунт</button>
        </form>
        <a href="index.html" class="back-link">← Вернуться назад</a>
    </div>
</body>
</html>
