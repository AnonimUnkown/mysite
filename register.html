<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - SuperShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфичные стили для этой страницы */
        .reg-card h2 { color: white; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; color: white;}
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 8px; background: rgba(255,255,255,0.1); color: white;
        }
        ::placeholder { color: rgba(255,255,255,0.7); }
        .back-link { display: block; margin-top: 15px; color: white; text-decoration: none; font-size: 0.9rem;}
    </style>
</head>
<body>
    
    <header>
        <a href="index.html" class="logo">SuperShop</a>
        <a href="#" class="cart-btn"><i class="fas fa-shopping-cart"></i> Корзина (0)</a>
    </header>

    <div class="main-content">
        <div class="reg-card">
            <h2><i class="fas fa-user-circle"></i> Регистрация</h2>
            <form>
                <div class="input-group">
                    <label>Ваше имя</label>
                    <input type="text" placeholder="Иван Иванов">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="ivan@mail.com">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%; margin: 10px 0;" onclick="alert('Успех!')">Создать аккаунт</button>
            </form>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Назад</a>
        </div>
    </div>
</body>
</html>
