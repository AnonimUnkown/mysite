<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары - SuperShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .back-link {
            color: white;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">SuperShop</a>
        <a href="#" class="cart-btn">
    <i class="fas fa-shopping-cart"></i> Корзина (<span id="cart-count">0</span>)
</a>
    </header>

    <h1 style="margin-top: 40px;">Наши товары</h1>
    
    <div class="products-grid">
        <div class="product-card">
            <img src="product1.jpg" alt="Товар 1">
            <h3>Крутые Кроссовки</h3>
            <p class="price">5 990 ₽</p>
            <button class="btn btn-primary btn-add-cart"><i class="fas fa-cart-plus"></i>В корзину</button>
        </div>

        <div class="product-card">
            <img src="product2.jpg" alt="Товар 2">
            <h3>Смартфон 2024</h3>
            <p class="price">49 990 ₽</p>
            <button class="btn btn-primary btn-add-cart"><i class="fas fa-cart-plus"></i>В корзину</button>
        </div>

        <div class="product-card">
            <img src="product3.jpg" alt="Товар 3">
            <h3>Умные Часы</h3>
            <p class="price">15 500 ₽</p>
            <button class="btn btn-primary btn-add-cart"><i class="fas fa-cart-plus"></i>В корзину</button>
        </div>
    </div>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Назад на главную</a>
    <script src="script.js"></script>
</body>
</html>
